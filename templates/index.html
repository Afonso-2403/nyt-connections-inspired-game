<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connections Prototype</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Connections-Style Game</h1>

    <!-- completed groups go here -->
    <div id="completedGroups"></div>

    <!-- remaining interactive grid -->
    <div id="grid"></div>

    <button id="submitBtn">Submit Group</button>
    <div id="result"></div>

    <button id="createPuzzleBtn">Create Puzzle</button>

    <div id="createPuzzleModal" class="modal-overlay" style="display:none;">
      <div class="modal-content">
        <h2>Create a New Puzzle</h2>
        <label for="puzzleName">Puzzle Name</label>
        <input type="text" id="puzzleName" placeholder="puzzle-abc1">
        <div id="categoryForms"></div>
        <div id="createError" class="create-error"></div>
        <div class="modal-buttons">
          <button id="createSubmitBtn" disabled>Submit Puzzle</button>
          <button id="createCancelBtn">Cancel</button>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
